<main class="result-page" *ngIf="payment"><section class="result-card failure"><div class="result-icon">×</div><p class="eyebrow">PAYMENT UNSUCCESSFUL</p><h1>Payment Failed</h1><p class="message">{{ payment.failureReason || 'Payment could not be processed. Your account has not been charged.' }}</p><div class="details"><div><span>Temporary order ID</span><strong>{{ payment.orderId }}</strong></div><div><span>Amount</span><strong>{{ payment.totalAmount | currency:'INR':'symbol':'1.0-0' }}</strong></div></div><button type="button" class="primary" (click)="retry()">Retry Payment</button><button type="button" class="secondary button-link" (click)="retry()">Change Payment Method</button><button type="button" class="cancel" (click)="cancel()">Cancel Order</button></section></main>
