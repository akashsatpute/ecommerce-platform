<header class="shop-header">
  <div class="header-main">
    <a class="logo" routerLink="/home" aria-label="Shopzy home"><span class="logo-mark">🛍</span><span>Shop<span class="logo-accent">zy</span></span></a>
    <label class="search-box"><span aria-hidden="true">⌕</span><input type="search" placeholder="Search for products, brands and more" aria-label="Search products"><kbd>⌘ K</kbd></label>
    <div class="header-actions">
      <ng-container *ngIf="!currentUser">
        <button class="account-button" type="button" (click)="openPopup('login')"><span class="action-icon">♙</span><span><small>Welcome</small>Sign in</span></button>
        <button class="signup-button" type="button" (click)="openPopup('signup')">Create account</button>
      </ng-container>
      <ng-container *ngIf="currentUser">
        <div class="account-button signed-in"><span class="avatar">{{ authService.getDisplayName(currentUser).slice(0,1) }}</span><span><small>Hi, {{ authService.getDisplayName(currentUser) }}</small>My account</span></div>
        <button class="logout-button" type="button" (click)="logout()">Sign out</button>
      </ng-container>
      <button class="cart-btn" routerLink="/cart" aria-label="Open cart"><svg class="cart-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8h14l-1 12H6L5 8Z"></path><path d="M9 10V6a3 3 0 0 1 6 0v4"></path></svg><span class="cart-label">Cart</span><span class="cart-count">{{ cartCount }}</span></button>
    </div>
  </div>
  <nav class="menu" aria-label="Product categories">
    <div class="menu-item" *ngFor="let menu of menus; let i = index" [class.submenu-active]="activeMenuIndex === i" (mouseenter)="onMenuHover(i)" (mouseleave)="onMenuLeave()">
      <a class="menu-link" [routerLink]="menu.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" (click)="closeSubmenu()">{{ menu.name }}<span class="caret" *ngIf="menu.subMenus.length"></span></a>
      <div class="submenu" *ngIf="menu.subMenus.length && activeMenuIndex === i"><a class="submenu-link" *ngFor="let sub of menu.subMenus" [routerLink]="buildSectionRoute(menu.route, sub.key)" (click)="closeSubmenu()">{{ sub.label }}</a></div>
    </div>
    <span class="menu-perk">✦ Deals refreshed daily</span>
  </nav>
</header>

<div class="popup-overlay" *ngIf="activePopup" (click)="closePopup()"><section class="popup-box" (click)="$event.stopPropagation()"><button class="close-btn" type="button" (click)="closePopup()">×</button><app-signup *ngIf="activePopup === 'signup'" (signUpSuccess)="onSignUpSuccess()"></app-signup><app-login *ngIf="activePopup === 'login'"></app-login></section></div>
