<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
</head>
<body>
     <form class="popup-form" (ngSubmit)="signup()">
            <h2>Create Account</h2>

            <label for="popupFirstName">First Name</label>
            <input id="popupFirstName" name="popupFirstName" type="text" placeholder="Enter first name" [(ngModel)]="firstName" required>

            <label for="popupLastName">Last Name</label>
            <input id="popupLastName" name="popupLastName" type="text" placeholder="Enter last name" [(ngModel)]="lastName" required>

            <label for="popupEmail">Email</label>
            <input id="popupEmail" name="popupEmail" type="email" placeholder="Enter email" [(ngModel)]="email" required>

            <label for="popupUsername">Username</label>
            <input id="popupUsername" name="popupUsername" type="text" placeholder="Choose username" [(ngModel)]="username" required>

            <label for="popupPassword">Password</label>
            <input id="popupPassword" name="popupPassword" type="password" placeholder="Create password" [(ngModel)]="password" required>

            <button type="submit" [disabled]="isSubmitting"> {{ isSubmitting ? 'Creating...' : 'Sign In' }}</button>

            <div class="auth-divider">or</div>
            <button class="oauth-btn" type="button" (click)="oauthLogin('google')" onsucc>Continue with Google</button>
            <button class="oauth-btn github" type="button" (click)="oauthLogin('github')">Continue with GitHub</button>

            <p class="success-message" *ngIf="authMessage">{{ authMessage }}</p>
            <p class="error-message" *ngIf="authError">{{ authError }}</p>
        </form>
    
</body>
</html>
